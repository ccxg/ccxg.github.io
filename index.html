    function postData(e, type, adsenseid)
    {
        var data = {
            "adsenseid": adsenseid,
            "user": {
                "uid": ""
            },
            "site": {
                "url": location.href.substring(0, 500),
                "referer": document.referrer.substring(0, 500)
            },
            "device": {
                "userAgent": navigator.userAgent
            },
            "data": {
                "type": 3,
                "version": "",
                "aeid": e.aeid,
                "action": type,
                "cid": e.cid,
                "mid": e.mid
            }
        };
        $.ajax({
            type:"POST",
            url:"http://guess.union2.50bang.org/trrs?data[type]=3&data[action]=" + type + "&adsenseid=" + adsenseid,
            data: data,
            crossDomain: true,
            success:function(e) {
            }
        });
    }

    function handleResponse(res)
    {
        if (res.reqid)
        {
            var i = res.reqid
            response[arrAdsenseid[i]] = res;
            //res.cid == '10000'是自己的
            var jumpUrl;
            if (res.cid != '10000')
            {
                jumpUrl = res.dsturl;
            }
            else
            {
                jumpUrl = res.dsturl + '?adsenseid=' + arrAdsenseid[i] + '&aeid='+ res.aeid + '&bannerImg=' + res.theme.bannerImg + '&title=' + encodeURI(res.theme.title) + '&bgColor=' + res.theme.bgColor + '&playTimes=' + res.playTimes + '&cid=' + res.cid + '&mid=' + res.mid;
            }
            $('#ID_'+arrAdsenseid[i]).children('a').eq(0).attr('href', jumpUrl);
            $('#ID_'+arrAdsenseid[i]).find('img').eq(0).attr('src', res.image);
            if (arrAdsenseid[i] == '10000801')
            {
                $('#ID_'+arrAdsenseid[i]).find('i').eq(0).css('background-image', 'url('+res.image+')');
            }
            //点击关闭后不显示，也不发展示统计
            if (arrAdsenseid[i] == '10000701' || (arrAdsenseid[i] == '10000901' && !$.fn.cookie('tuia_hongbao_close')) || (arrAdsenseid[i] == '10000801') && !$.fn.cookie('xuanfu_ad_close'))
            {
                postData(res, 'show', arrAdsenseid[i]);
            }
        }
    }
